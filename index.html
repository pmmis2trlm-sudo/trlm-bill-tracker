<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TRLM SMMU &mdash; Bill Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tiro+Bangla:ital@0;1&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#12305C; --navy-deep:#0B2246; --gold:#E0A93A; --gold-soft:#F3D9A0;
    --saffron:#D9662B; --green:#146B3A; --paper:#F6F1E4; --paper-line:#E3D9C0;
    --ink:#20242C; --ink-soft:#5B5A50; --red:#B23A3A; --amber:#C6821F; --ok:#1E7A46;
    --card:#FFFDF8; --radius:10px; --shadow: 0 2px 10px rgba(18,48,92,.08), 0 1px 2px rgba(18,48,92,.06);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      linear-gradient(180deg, rgba(18,48,92,0.04), rgba(18,48,92,0) 220px),
      repeating-linear-gradient(180deg, transparent, transparent 27px, var(--paper-line) 28px),
      var(--paper);
    color:var(--ink); font-family:'Inter',sans-serif; min-height:100vh;
  }
  .mono{font-family:'IBM Plex Mono',monospace;}
  .serif{font-family:'Tiro Bangla',serif;}
  .topbar{
    background: linear-gradient(180deg,var(--navy) 0%, var(--navy-deep) 100%); color:#fff;
    padding:14px 22px; display:flex; align-items:center; gap:16px; box-shadow:var(--shadow);
    position:sticky; top:0; z-index:50; border-bottom:3px solid var(--gold);
  }
  .topbar img{height:52px;width:52px;border-radius:50%;box-shadow:0 0 0 2px var(--gold);}
  .topbar .title{display:flex; flex-direction:column; line-height:1.15;}
  .topbar .title .en{font-family:'Tiro Bangla',serif; font-size:20px; font-weight:700;}
  .topbar .title .sub{font-size:11.5px; color:var(--gold-soft); letter-spacing:.4px; text-transform:uppercase;}
  .topbar .spacer{flex:1;}
  .topbar .who{font-size:13px; text-align:right;}
  .topbar .who b{color:var(--gold-soft);}
  .topbar button.logout{
    background:transparent;border:1px solid rgba(255,255,255,.4); color:#fff;
    padding:7px 14px;border-radius:6px;cursor:pointer;font-size:12.5px;font-weight:600;
  }
  .topbar button.logout:hover{background:rgba(255,255,255,.12);}
  .navtabs{display:flex; gap:4px; padding:0 22px; background:var(--navy-deep); overflow-x:auto;}
  .navtabs button{
    background:none;border:none;color:#cfd8ea;padding:11px 16px;cursor:pointer;
    font-size:13px;font-weight:600;letter-spacing:.2px;border-bottom:3px solid transparent; white-space:nowrap;
  }
  .navtabs button.active{color:#fff; border-bottom:3px solid var(--gold);}
  .navtabs button:hover{color:#fff;}
  .wrap{max-width:1180px;margin:0 auto;padding:26px 20px 70px;}
  .hero{display:grid; grid-template-columns: 1.1fr .9fr; gap:34px; align-items:center; padding:38px 6px 10px;}
  @media (max-width:840px){ .hero{grid-template-columns:1fr;} }
  .hero h1{font-family:'Tiro Bangla',serif; font-size:40px; margin:0 0 10px; color:var(--navy-deep); line-height:1.12;}
  .hero p.lead{color:var(--ink-soft); font-size:15.5px; line-height:1.6; max-width:520px;}
  .stamp-row{display:flex; gap:10px; margin-top:18px; flex-wrap:wrap;}
  .stamp{
    border:1.5px dashed var(--navy); color:var(--navy); font-family:'IBM Plex Mono',monospace;
    font-size:11px; padding:6px 10px; border-radius:30px; letter-spacing:.5px; font-weight:600;
  }
  .login-card{
    background:var(--card); border:1px solid var(--paper-line); border-radius:var(--radius);
    box-shadow:var(--shadow); padding:26px 26px 22px; position:relative; overflow:hidden;
  }
  .login-card:before{
    content:""; position:absolute; top:0; left:0; right:0; height:6px;
    background:linear-gradient(90deg,var(--saffron),var(--paper),var(--green));
  }
  .login-card h2{margin:14px 0 4px; font-size:19px; color:var(--navy-deep); font-family:'Tiro Bangla',serif;}
  .login-card .hint{font-size:12.5px;color:var(--ink-soft);margin-bottom:16px;}
  label{display:block; font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.5px; color:var(--navy); margin:14px 0 5px;}
  select, input[type=text], input[type=password], input[type=number], input[type=date], textarea{
    width:100%; padding:10px 11px; border:1px solid #cfc3a2; border-radius:7px; background:#fffef9;
    font-size:14px; font-family:'Inter',sans-serif; color:var(--ink);
  }
  select:focus, input:focus, textarea:focus{outline:2px solid var(--gold); outline-offset:1px; border-color:var(--navy);}
  .btn{
    display:inline-flex; align-items:center; justify-content:center; gap:6px;
    background:var(--navy); color:#fff; border:none; padding:11px 18px; border-radius:7px;
    font-size:13.5px; font-weight:700; cursor:pointer; letter-spacing:.2px; margin-top:16px;
  }
  .btn:hover{background:var(--navy-deep);}
  .btn.gold{background:var(--saffron);}
  .btn.gold:hover{background:#b6551f;}
  .btn.ghost{background:transparent;border:1.5px solid var(--navy); color:var(--navy);}
  .btn.ghost:hover{background:rgba(18,48,92,.06);}
  .btn.sm{padding:6px 12px;font-size:12px;margin-top:0;}
  .btn:disabled{opacity:.45;cursor:not-allowed;}
  .err{color:var(--red); font-size:12.5px; margin-top:8px; font-weight:600;}
  .section-title{display:flex; align-items:baseline; gap:10px; margin:26px 0 14px;}
  .section-title h3{font-family:'Tiro Bangla',serif; font-size:21px; color:var(--navy-deep); margin:0;}
  .section-title .rule{flex:1; height:1px; background:var(--paper-line);}
  .kpi-row{display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:6px;}
  @media (max-width:760px){.kpi-row{grid-template-columns:repeat(2,1fr);}}
  .kpi{
    background:var(--card); border:1px solid var(--paper-line); border-radius:var(--radius); padding:16px 18px;
    box-shadow:var(--shadow); border-left:4px solid var(--navy);
  }
  .kpi .num{font-family:'IBM Plex Mono',monospace; font-size:26px; font-weight:600; color:var(--navy-deep);}
  .kpi .lbl{font-size:11.5px; text-transform:uppercase; letter-spacing:.4px; color:var(--ink-soft); margin-top:2px;}
  .kpi.pending{border-left-color:var(--amber);}
  .kpi.approved{border-left-color:var(--ok);}
  .kpi.rejected{border-left-color:var(--red);}
  table{width:100%; border-collapse:collapse; background:var(--card); border-radius:var(--radius); overflow:hidden; box-shadow:var(--shadow);}
  thead tr{background:var(--navy); color:#fff;}
  th{text-align:left; font-size:11.5px; text-transform:uppercase; letter-spacing:.4px; padding:11px 12px; font-weight:600;}
  td{padding:11px 12px; font-size:13.2px; border-top:1px solid var(--paper-line); vertical-align:middle;}
  tbody tr:hover{background:#faf6ea;}
  .badge{display:inline-block; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:700; letter-spacing:.3px; font-family:'IBM Plex Mono',monospace;}
  .badge.Pending{background:#fbe9cf; color:var(--amber);}
  .badge.Approved{background:#dcf0e1; color:var(--ok);}
  .badge.Rejected{background:#f7dcdc; color:var(--red);}
  .badge.Query{background:#e1e6f5; color:#3a4bb2;}
  .delay-ok{color:var(--ok); font-weight:600;}
  .delay-warn{color:var(--amber); font-weight:700;}
  .delay-bad{color:var(--red); font-weight:700;}
  .grid2{display:grid; grid-template-columns:1.3fr .9fr; gap:20px;}
  @media (max-width:900px){.grid2{grid-template-columns:1fr;}}
  .head-row{display:flex; gap:8px; align-items:center; background:#fffef9; border:1px solid var(--paper-line); padding:9px 11px; border-radius:7px; margin-bottom:7px;}
  .head-row .name{flex:1; font-weight:600; font-size:13.5px;}
  .head-row .amt{font-family:'IBM Plex Mono',monospace; font-size:13px; color:var(--navy);}
  .card-box{background:var(--card); border:1px solid var(--paper-line); border-radius:var(--radius); box-shadow:var(--shadow); padding:20px;}
  .photo-thumb{width:54px;height:54px;object-fit:cover;border-radius:6px;border:1px solid var(--paper-line); cursor:pointer;}
  .modal-bg{position:fixed;inset:0;background:rgba(18,20,26,.68);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px;}
  .modal{background:#fff;border-radius:10px;max-width:640px;width:100%;max-height:88vh;overflow:auto;padding:22px;box-shadow:0 20px 60px rgba(0,0,0,.35);}
  .modal img{width:100%;border-radius:8px;margin-top:10px;}
  .modal .close{float:right;background:none;border:none;font-size:20px;cursor:pointer;color:var(--ink-soft);}
  .footnote{font-size:11.5px;color:var(--ink-soft); margin-top:30px; border-top:1px dashed var(--paper-line); padding-top:14px; line-height:1.6;}
  .empty{padding:30px;text-align:center;color:var(--ink-soft);font-size:13.5px;}
  .flex-between{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;}
  .two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  @media (max-width:640px){.two-col{grid-template-columns:1fr;}}
  .loading{padding:60px;text-align:center;color:var(--ink-soft);font-size:14px;}
  .filter-bar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;align-items:center;}
  .filter-bar select{width:auto;}
  small.helptext{display:block;color:var(--ink-soft);font-size:11.5px;margin-top:4px;}
  .config-banner{
    background:#fff3d6; border:1px solid #e6c675; color:#6b4b06; padding:12px 18px; font-size:13px;
    border-radius:8px; margin:16px 20px 0; max-width:1140px; margin-left:auto; margin-right:auto;
  }
  .config-banner code{background:#fff; padding:1px 6px; border-radius:4px; border:1px solid #e6c675;}
</style>
</head>

  loading: true, data: {}, loggedInVertical: null, view: "landing",

///////////////////////// API HELPERS /////////////////////////
async function apiGet(action, params){
  const qs = new URLSearchParams({action, ...(params||{})}).toString();
  const res = await fetch(API_URL + "?" + qs);
  return res.json();
}
async function apiPost(action, payload){
  const res = await fetch(API_URL, {
    method: "POST",
    headers: {"Content-Type":"text/plain;charset=utf-8"},
    body: JSON.stringify({action, ...payload})
  });
  return res.json();
}

async function loadData(){
  if(!CONFIGURED){
    const blank = {};
    VERTICALS.forEach(v=>{ blank[v] = {hasPassword:false, heads:[], bills:[]}; });
    return blank;
  }
  try{
    const data = await apiGet("getData");
    VERTICALS.forEach(v=>{ if(!data[v]) data[v] = {hasPassword:false, heads:[], bills:[]}; });
    return data;
  }catch(e){
    showToast("Could not reach the backend. Check the API_URL and your connection.", true);
    const blank = {};
    VERTICALS.forEach(v=>{ blank[v] = {hasPassword:false, heads:[], bills:[]}; });
    return blank;
  }
}

async function refreshData(){ STATE.data = await loadData(); }

function showToast(msg, isErr){
  STATE.toast = {msg, isErr}; render();
  setTimeout(()=>{ STATE.toast=null; render(); }, 3400);
}
function todayISO(){ return new Date().toISOString().slice(0,10); }
function daysBetween(d1,d2){ const a=new Date(d1), b=new Date(d2); return Math.floor((b-a)/86400000); }
function fmtINR(n){ n = Number(n)||0; return "\u20B9"+n.toLocaleString('en-IN'); }

///////////////////////// INIT /////////////////////////
async function init(){
  STATE.data = await loadData();
  STATE.loading = false;
  render();
}

///////////////////////// RENDER /////////////////////////
function on(id, evt, fn){ const el = document.getElementById(id); if(el) el.addEventListener(evt, fn); }

function render(){
  const app = document.getElementById('app');
  if(STATE.loading){ app.innerHTML = `<div class="loading">Loading bill tracker&hellip;</div>`; return; }
  let banner = "";
  if(!CONFIGURED){
    banner = `<div class="config-banner">This is running without a connected backend yet, so nothing you enter will be saved.
      Deploy the included Google Apps Script and paste its Web App URL into <code>API_URL</code> near the top of this file.</div>`;
  }
  let body = "";
  if(!STATE.loggedInVertical){
    body = renderLanding();
  } else {
    body = renderTopbar() + renderNavtabs() + banner + `<div class="wrap">` + renderView() + `</div>`;
  }
  if(!STATE.loggedInVertical) body = body.replace('<div class="wrap">', banner + `<div class="wrap">`);
  if(STATE.toast){
    body += `<div style="position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
      background:${STATE.toast.isErr?'#B23A3A':'#12305C'};color:#fff;padding:11px 20px;border-radius:8px;
      font-size:13px;box-shadow:0 8px 24px rgba(0,0,0,.25);z-index:300;">${STATE.toast.msg}</div>`;
  }
  if(STATE.photoModal) body += renderPhotoModal();
  app.innerHTML = body;
  bindEvents();
}

function renderNavtabs(){
  if(STATE.loggedInVertical === "__public__") return `<div class="navtabs"><button class="active">Dashboard</button></div>`;
  const isFinance = STATE.loggedInVertical === FINANCE_VERTICAL;
  const tabs = [["dashboard","Dashboard"],["heads","Heads of Account"],["submit","Submit a Bill"],["mybills","My Bills"]];
  if(isFinance) tabs.push(["finance","Finance Queue"]);
  return `<div class="navtabs">${tabs.map(([id,label])=>`<button class="${STATE.view===id?'active':''}" data-view="${id}">${label}</button>`).join('')}</div>`;
}

function renderView(){
  switch(STATE.view){
    case "heads": return renderHeads();
    case "submit": return renderSubmit();
    case "mybills": return renderMyBills();
    case "finance": return renderFinanceQueue();
    default: return renderDashboard();
  }
}

function renderHeads(){
  const v = STATE.loggedInVertical;
  const heads = STATE.data[v].heads;
  const totalAllocated = heads.reduce((s,h)=>s+Number(h.allocated||0),0);
  return `
  <div class="section-title"><h3>Heads of Account &mdash; ${v}</h3><div class="rule"></div></div>
  <p style="color:var(--ink-soft);font-size:13.5px;max-width:640px;">Add every head of account your vertical draws bills against, with the amount allocated to it.</p>
  <div class="grid2">
    <div class="card-box">
      <div class="flex-between" style="margin-bottom:10px;">
        <b style="font-size:14px;">Current heads</b>
        <span class="mono" style="font-size:13px;color:var(--navy);">Total: ${fmtINR(totalAllocated)}</span>
      </div>
      ${heads.length===0 ? `<div class="empty">No heads of account added yet.</div>` :
        heads.map(h=>`<div class="head-row"><div class="name">${h.name}</div><div class="amt">${fmtINR(h.allocated)}</div>
          <button class="btn sm ghost" data-del-head="${h.id}">Remove</button></div>`).join('')}
    </div>
    <div class="card-box">
      <b style="font-size:14px;">Add a head of account</b>
      <label>Head of account name</label>
      <input type="text" id="in-head-name" placeholder="e.g. Training &amp; Capacity Building">
      <label>Amount allocated</label>
      <input type="number" id="in-head-amt" placeholder="e.g. 250000">
      <button class="btn" id="btn-add-head" ${STATE.busy?'disabled':''}>${STATE.busy?'Adding…':'Add head'}</button>
    </div>
  </div>`;
}

function renderSubmit(){
  const v = STATE.loggedInVertical;
  const heads = STATE.data[v].heads;
  if(heads.length===0){
    return `<div class="section-title"><h3>Submit a Bill</h3><div class="rule"></div></div>
    <div class="card-box empty">Add at least one head of account before submitting a bill.
    <br><br><button class="btn" data-view="heads">Go to Heads of Account</button></div>`;
  }
  return `
  <div class="section-title"><h3>Submit a Bill &mdash; ${v}</h3><div class="rule"></div></div>
  <div class="card-box" style="max-width:640px;">
    <label>Head of account</label>
    <select id="in-bill-head">${heads.map(h=>`<option value="${h.id}">${h.name} (${fmtINR(h.allocated)} allocated)</option>`).join('')}</select>
    <div class="two-col">
      <div><label>Bill / proposal title</label><input type="text" id="in-bill-title" placeholder="e.g. Stationery purchase, Q2 training venue"></div>
      <div><label>Bill number (if any)</label><input type="text" id="in-bill-no" placeholder="e.g. INV-0234"></div>
    </div>
    <div class="two-col">
      <div><label>Bill amount</label><input type="number" id="in-bill-amt" placeholder="e.g. 12500"></div>
      <div><label>Bill date</label><input type="date" id="in-bill-date" value="${todayISO()}"></div>
    </div>
    <label>Details</label>
    <textarea id="in-bill-details" rows="3" placeholder="Short description of the expense / proposal"></textarea>
    <label>Photograph of the bill</label>
    <input type="file" id="in-bill-photo" accept="image/*">
    <small class="helptext">Attach a clear photo of the physical bill or invoice.</small>
    ${STATE.loginError ? `<div class="err">${STATE.loginError}</div>` : ''}
    <button class="btn gold" id="btn-submit-bill" ${STATE.busy?'disabled':''}>${STATE.busy?'Submitting…':'Submit bill'}</button>
  </div>`;
}

function renderMyBills(){
  const v = STATE.loggedInVertical;
  const bills = [...STATE.data[v].bills].sort((a,b)=> b.submittedDate.localeCompare(a.submittedDate));
  return `
  <div class="section-title"><h3>My Bills &mdash; ${v}</h3><div class="rule"></div></div>
  ${bills.length===0 ? `<div class="card-box empty">No bills submitted yet.</div>` : `
  <table><thead><tr><th>Title</th><th>Head</th><th>Amount</th><th>Bill date</th><th>Submitted</th><th>Status</th><th>Delay</th><th>Photo</th></tr></thead>
  <tbody>${bills.map(renderBillRow).join('')}</tbody></table>`}`;
}

function renderBillRow(b){
  const delayDays = b.status==='Pending' ? daysBetween(b.submittedDate, todayISO()) : daysBetween(b.submittedDate, b.statusDate||todayISO());
  let delayClass = 'delay-ok';
  if(delayDays>15) delayClass='delay-bad'; else if(delayDays>7) delayClass='delay-warn';
  return `<tr>
    <td><b>${b.title}</b>${b.billNo?`<br><span class="mono" style="font-size:11px;color:var(--ink-soft);">${b.billNo}</span>`:''}</td>
    <td>${b.headName}</td><td class="mono">${fmtINR(b.amount)}</td><td class="mono">${b.billDate}</td>
    <td class="mono">${b.submittedDate}</td>
    <td><span class="badge ${b.status}">${b.status}</span>${b.remark?`<br><span style="font-size:11px;color:var(--ink-soft);">${b.remark}</span>`:''}</td>
    <td class="${delayClass}">${delayDays}d</td>
    <td>${b.photoUrl?`<img class="photo-thumb" data-photo-url="${b.photoUrl}" src="${b.photoUrl}" alt="bill">`:'&mdash;'}</td>
  </tr>`;
}

function renderFinanceQueue(){
  let all = [];
  VERTICALS.forEach(v=>{ if(v===FINANCE_VERTICAL) return; STATE.data[v].bills.forEach(b=> all.push({...b, vertical:v})); });
  all.sort((a,b)=> (a.status==='Pending')===(b.status==='Pending') ? a.submittedDate.localeCompare(b.submittedDate) : (a.status==='Pending'?-1:1));
  const filter = STATE.dashboardFilter;
  const filtered = filter==="All" ? all : all.filter(b=>b.status===filter);
  return `
  <div class="section-title"><h3>Finance Queue</h3><div class="rule"></div></div>
  <div class="filter-bar"><span style="font-size:12.5px;color:var(--ink-soft);">Filter:</span>
    <select id="sel-finance-filter">${["All","Pending","Approved","Rejected","Query"].map(s=>`<option ${s===filter?'selected':''}>${s}</option>`).join('')}</select>
  </div>
  ${filtered.length===0 ? `<div class="card-box empty">No bills in this filter.</div>` : `
  <table><thead><tr><th>Vertical</th><th>Title</th><th>Amount</th><th>Submitted</th><th>Delay</th><th>Status</th><th>Photo</th><th>Action</th></tr></thead>
  <tbody>${filtered.map(b=>{
    const delayDays = b.status==='Pending' ? daysBetween(b.submittedDate, todayISO()) : daysBetween(b.submittedDate, b.statusDate||todayISO());
    let delayClass = 'delay-ok'; if(delayDays>15) delayClass='delay-bad'; else if(delayDays>7) delayClass='delay-warn';
    return `<tr>
      <td><b>${b.vertical}</b></td>
      <td>${b.title}${b.billNo?`<br><span class="mono" style="font-size:11px;color:var(--ink-soft);">${b.billNo}</span>`:''}</td>
      <td class="mono">${fmtINR(b.amount)}</td><td class="mono">${b.submittedDate}</td>
      <td class="${delayClass}">${delayDays}d</td><td><span class="badge ${b.status}">${b.status}</span></td>
      <td>${b.photoUrl?`<img class="photo-thumb" data-photo-url="${b.photoUrl}" src="${b.photoUrl}" alt="bill">`:'&mdash;'}</td>
      <td><select data-status-vertical="${b.vertical}" data-status-bill="${b.id}" class="finance-status-select">
        ${["Pending","Approved","Rejected","Query"].map(s=>`<option ${s===b.status?'selected':''}>${s}</option>`).join('')}
      </select></td>
    </tr>`;
  }).join('')}</tbody></table>`}`;
}

function renderDashboard(){
  let all = [];
  VERTICALS.forEach(v=>{ STATE.data[v].bills.forEach(b=> all.push({...b, vertical:v})); });
  const total = all.length;
  const pending = all.filter(b=>b.status==='Pending').length;
  const approved = all.filter(b=>b.status==='Approved').length;
  const rejected = all.filter(b=>b.status==='Rejected'||b.status==='Query').length;
  const pendingAmt = all.filter(b=>b.status==='Pending').reduce((s,b)=>s+Number(b.amount||0),0);
  const perVertical = VERTICALS.map(v=>{
    const bills = STATE.data[v].bills;
    const vPending = bills.filter(b=>b.status==='Pending');
    const maxDelay = vPending.length ? Math.max(...vPending.map(b=>daysBetween(b.submittedDate, todayISO()))) : 0;
    const lastActivity = bills.length ? bills.map(b=>b.submittedDate).sort().slice(-1)[0] : "&mdash;";
    return {v, count: bills.length, pending: vPending.length, maxDelay, lastActivity};
  });
  return `
  <div class="section-title"><h3>Programme Dashboard</h3><div class="rule"></div></div>
  <div class="kpi-row">
    <div class="kpi"><div class="num">${total}</div><div class="lbl">Total bills logged</div></div>
    <div class="kpi pending"><div class="num">${pending}</div><div class="lbl">Pending at Finance</div></div>
    <div class="kpi approved"><div class="num">${approved}</div><div class="lbl">Approved</div></div>
    <div class="kpi rejected"><div class="num">${rejected}</div><div class="lbl">Rejected / Query</div></div>
  </div>
  <p style="font-size:12.5px;color:var(--ink-soft);margin:14px 2px 0;">Pending value across all verticals: <b class="mono">${fmtINR(pendingAmt)}</b></p>
  <div class="section-title"><h3>Vertical-wise status &amp; delay</h3><div class="rule"></div></div>
  <table><thead><tr><th>Vertical</th><th>Bills logged</th><th>Pending</th><th>Longest pending delay</th><th>Last activity</th></tr></thead>
  <tbody>${perVertical.map(r=>{
    let delayClass='delay-ok'; if(r.maxDelay>15) delayClass='delay-bad'; else if(r.maxDelay>7) delayClass='delay-warn';
    return `<tr><td><b>${r.v}</b></td><td class="mono">${r.count}</td><td class="mono">${r.pending}</td>
      <td class="${delayClass}">${r.pending? r.maxDelay+'d' : '&mdash;'}</td><td class="mono">${r.lastActivity}</td></tr>`;
  }).join('')}</tbody></table>
  <div class="footnote">Delay is measured in calendar days from the date a bill was submitted to today (if still pending)
  or to the date Finance last updated its status. 0&ndash;7 days is shown in green, 8&ndash;15 in amber, and 16+ in red.</div>`;
}

function renderPhotoModal(){
  return `<div class="modal-bg" id="modal-bg"><div class="modal">
    <button class="close" id="modal-close">&times;</button>
    <b>Bill photograph</b>
    <img src="${STATE.photoModal}">
  </div></div>`;
}

///////////////////////// EVENTS /////////////////////////
function bindEvents(){
  document.querySelectorAll('[data-view]').forEach(el=>{
    el.addEventListener('click', ()=>{ STATE.view = el.getAttribute('data-view'); STATE.loginError=""; render(); });
  });
  on('sel-vertical','change', e=>{ STATE.loginSelect = e.target.value; STATE.loginError=""; render(); });
  on('btn-view-dashboard','click', ()=>{ STATE.loggedInVertical = "__public__"; STATE.view="dashboard"; render(); });
  on('btn-logout','click', ()=>{ STATE.loggedInVertical=null; STATE.view="landing"; STATE.loginError=""; render(); });

  on('btn-login','click', async ()=>{
    const v = STATE.loginSelect;
    const pass = document.getElementById('in-password').value;
    if(!CONFIGURED){ STATE.loginError = "Backend not connected yet."; render(); return; }
    STATE.busy = true; render();
    const res = await apiPost("login", {vertical:v, password:pass});
    STATE.busy = false;
    if(res.ok){ STATE.loggedInVertical = v; STATE.view="dashboard"; STATE.loginError=""; }
    else { STATE.loginError = res.error || "Incorrect password."; }
    render();
  });
  on('btn-reset-flow','click', async (e)=>{
    e.preventDefault();
    const v = STATE.loginSelect;
    if(!CONFIGURED){ return; }
    if(confirm("Reset the password for "+v+"? This vertical will need to set a new password on next login.")){
      await apiPost("resetPassword", {vertical:v});
      await refreshData();
      STATE.loginError=""; render();
    }
  });
  on('btn-set-password','click', async ()=>{
    const v = STATE.loginSelect;
    const p1 = document.getElementById('in-newpass').value;
    const p2 = document.getElementById('in-newpass2').value;
    if(!p1 || p1.length<4){ STATE.loginError = "Password must be at least 4 characters."; render(); return; }
    if(p1 !== p2){ STATE.loginError = "Passwords do not match."; render(); return; }
    if(!CONFIGURED){ STATE.loginError = "Backend not connected yet."; render(); return; }
    STATE.busy = true; render();
    const res = await apiPost("setPassword", {vertical:v, password:p1});
    STATE.busy = false;
    if(res.ok){
      await refreshData();
      STATE.loggedInVertical = v; STATE.view="dashboard"; STATE.loginError="";
    } else { STATE.loginError = res.error || "Could not set password."; }
    render();
  });

  on('btn-add-head','click', async ()=>{
    const name = document.getElementById('in-head-name').value.trim();
    const amt = document.getElementById('in-head-amt').value;
    if(!name || !amt){ showToast("Enter a head name and allocated amount.", true); return; }
    STATE.busy = true; render();
    await apiPost("addHead", {vertical: STATE.loggedInVertical, name, allocated:Number(amt)});
    await refreshData();
    STATE.busy = false; render();
  });
  document.querySelectorAll('[data-del-head]').forEach(el=>{
    el.addEventListener('click', async ()=>{
      const id = el.getAttribute('data-del-head');
      await apiPost("deleteHead", {vertical: STATE.loggedInVertical, headId:id});
      await refreshData(); render();
    });
  });

  on('btn-submit-bill','click', async ()=>{
    const v = STATE.loggedInVertical;
    const headId = document.getElementById('in-bill-head').value;
    const title = document.getElementById('in-bill-title').value.trim();
    const billNo = document.getElementById('in-bill-no').value.trim();
    const amt = document.getElementById('in-bill-amt').value;
    const billDate = document.getElementById('in-bill-date').value;
    const details = document.getElementById('in-bill-details').value.trim();
    const fileInput = document.getElementById('in-bill-photo');
    if(!title || !amt || !billDate){ STATE.loginError = "Please fill in title, amount and bill date."; render(); return; }
    const head = STATE.data[v].heads.find(h=>h.id===headId);
    STATE.loginError=""; STATE.busy = true; render();

    const finish = async (photoBase64, photoMime)=>{
      await apiPost("submitBill", {
        vertical:v, headId, headName: head?head.name:"", title, billNo, amount:Number(amt),
        billDate, details, submittedDate: todayISO(), photoBase64, photoMime
      });
      await refreshData();
      STATE.busy = false; STATE.view = "mybills";
      showToast("Bill submitted.");
    };

    if(fileInput.files && fileInput.files[0]){
      const reader = new FileReader();
      reader.onload = ()=> finish(reader.result, fileInput.files[0].type);
      reader.readAsDataURL(fileInput.files[0]);
    } else {
      finish(null, null);
    }
  });

  document.querySelectorAll('.finance-status-select').forEach(el=>{
    el.addEventListener('change', async ()=>{
      const id = el.getAttribute('data-status-bill');
      const newStatus = el.value;
      await apiPost("updateBillStatus", {billId:id, status:newStatus, remark:""});
      await refreshData(); render();
      showToast("Bill marked "+newStatus+".");
    });
  });
  on('sel-finance-filter','change', e=>{ STATE.dashboardFilter = e.target.value; render(); });

  document.querySelectorAll('[data-photo-url]').forEach(img=>{
    img.addEventListener('click', ()=>{ STATE.photoModal = img.getAttribute('data-photo-url'); render(); });
  });
  on('modal-close','click', ()=>{ STATE.photoModal=null; render(); });
  on('modal-bg','click', (e)=>{ if(e.target.id==='modal-bg'){ STATE.photoModal=null; render(); } });
}

init();
</script>
</body>
</html>
